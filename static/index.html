<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>iOS 座標模擬</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: "SF Pro Text", -apple-system, "Segoe UI", sans-serif;
      background: #0f0f12;
      color: #e4e4e7;
    }
    .app {
      display: flex;
      width: 100vw;
      height: 100vh;
    }
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: #18181b;
      border-right: 1px solid #27272a;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .sidebar h2 {
      font-size: 0.875rem;
      font-weight: 600;
      margin: 0 0 0.5rem 0;
      color: #fafafa;
    }
    .sidebar label {
      display: block;
      font-size: 0.75rem;
      color: #a1a1aa;
      margin-bottom: 4px;
    }
    .sidebar input, .sidebar select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #3f3f46;
      border-radius: 6px;
      background: #27272a;
      color: #e4e4e7;
      font-size: 0.8125rem;
      margin-bottom: 8px;
    }
    .sidebar input::placeholder { color: #71717a; }
    .sidebar .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .sidebar .row input { flex: 1; min-width: 0; margin-bottom: 0; }
    .btn {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: #3b82f6;
      color: #fff;
    }
    .btn:hover { background: #2563eb; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.danger { background: #dc2626; }
    .btn.danger:hover { background: #b91c1c; }
    .btn.secondary { background: #3f3f46; color: #e4e4e7; }
    .btn.secondary:hover { background: #52525b; }
    .sidebar-actions-stack .btn { width: 100%; }
    .sidebar-actions-stack .btn + .btn { margin-top: 8px; }
    .right {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }
    .map-wrap {
      flex: 1;
      position: relative;
      min-height: 0;
    }
    #map {
      width: 100%;
      height: 100%;
      background: #18181b;
    }
    header {
      padding: 0.5rem 1rem;
      background: rgba(24, 24, 27, 0.95);
      border-bottom: 1px solid rgba(39, 39, 42, 0.8);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    h1 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0;
    }
    .coords {
      font-size: 0.8125rem;
      color: #a1a1aa;
      font-variant-numeric: tabular-nums;
    }
    .coords strong { color: #fafafa; }
    .status {
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 4px;
      margin-left: auto;
    }
    .status.ok { background: #14532d; color: #86efac; }
    .status.err { background: #7f1d1d; color: #fca5a5; }
    .hint {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.75);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.75rem;
      color: #a1a1aa;
      pointer-events: none;
      z-index: 1000;
    }
    .sidebar-section { padding-bottom: 0.5rem; }
    .speed-hint { font-size: 0.7rem; color: #71717a; margin: -4px 0 8px 0; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <section class="sidebar-section">
        <h2>目前座標</h2>
        <label for="inputCoords">GPS 座標（緯度, 經度）</label>
        <input type="text" id="inputCoords" placeholder="40.720638, -74.000816" autocomplete="off" />
        <div class="sidebar-actions-stack">
          <button type="button" class="btn" id="btnMove">移動</button>
          <button type="button" class="btn secondary" id="btnRecenter">回到現實位置</button>
        </div>
      </section>
      <section class="sidebar-section">
        <h2>定時移動</h2>
        <label>時速 (km/h)</label>
        <input type="number" id="inputSpeed" placeholder="18" min="0" step="1" value="18" />
        <p class="speed-hint" id="speedHint">約 5.0 m/s（每秒移動距離）</p>
        <label>持續時間 (分鐘)</label>
        <input type="number" id="inputDuration" placeholder="60" min="1" step="1" value="60" />
        <label>方位</label>
        <select id="inputDir">
          <option value="N">北</option>
          <option value="E">東</option>
          <option value="S">南</option>
          <option value="W">西</option>
        </select>
        <div class="row" style="margin-top:8px;">
          <button type="button" class="btn" id="btnStart">開始</button>
          <button type="button" class="btn danger" id="btnStop" disabled>停止</button>
        </div>
      </section>
    </aside>
    <div class="right">
      <header>
        <h1>iOS 座標模擬</h1>
        <span class="coords">目前座標：<strong id="cur">--</strong></span>
        <span id="status" class="status" style="display:none;"></span>
      </header>
      <div class="map-wrap">
        <div id="map"></div>
        <div class="hint">點選地圖即可將該點設為裝置模擬位置</div>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
